<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Money Tracker</h1>
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round">
                            <span class="mode-icon">☀️</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="month-nav">
                <button onclick="changeMonth(-1)">◀</button>
                <h2 id="month-display"></h2> 
                <button onclick="changeMonth(1)">▶</button>
            </div>
        </header>

        <div class="app-grid">
            <aside class="left-panel">
            <div class="card balance-card">
                <span>Total Saldo (Bulan Ini)</span>
                <h2 id="total-balance">Rp 0</h2>
            </div>
            
            <div class="card wallet-card">
                <div class="wallet-grid">
                    <div class="wallet-item">
                        <span>Cash 💵</span>
                        <h4 id="wallet-cash">Rp 0</h4>
                    </div>
                    <div class="wallet-item border-left">
                        <span>Bank 🏦</span>
                        <h4 id="wallet-bank">Rp 0</h4>
                    </div>
                    <div class="wallet-item border-left">
                        <span>QRIS 📱</span>
                        <h4 id="wallet-qris">Rp 0</h4>
                    </div>
                </div>
            </div>

            <div class="card summary-card">
                <div class="summary-grid">
                    <div class="summary-item">
                        <span>Pemasukan</span>
                        <h4 id="total-income">Rp 0</h4>
                    </div>
                    <div class="summary-item border-left">
                        <span>Pengeluaran</span>
                        <h4 id="total-expense">Rp 0</h4>
                    </div>
                </div>
            </div>

            <div class="card chart-card">
                <canvas id="transactionChart"></canvas>
            </div>
        </aside>

            <main class="right-panel">
                <div class="card action-card">
                    <h3>Tambah Transaksi</h3>
                    <form id="transaction-form">
                        <div class="type-selector">
                            <label><input type="radio" name="transaction-type" value="income" checked><span>Pemasukan</span></label>
                            <label><input type="radio" name="transaction-type" value="expense"><span>Pengeluaran</span></label>
                        </div>
                        <input type="number" id="amount" placeholder="Jumlah (Rp)" required>
                        <div class="row-input">
                            <select id="wallet-type" required>
                                <option value="">Dompet</option>
                                <option value="cash">Cash</option>
                                <option value="bank">Bank</option>
                                <option value="qris">QRIS</option>
                            </select>
                            <select id="category" required></select>
                        </div>
                        <input type="date" id="date" required>
                        <input type="text" id="note" placeholder="Catatan (Opsional)">
                        <button type="submit" class="btn-primary">Simpan Transaksi</button>
                    </form>
                </div>

                <section class="card action-card history">
                    <div class="history-header">
                        <h3>Riwayat Transaksi</h3>
                        <button onclick="exportToCSV()" class="btn-secondary">Export 📥</button>
                    </div>
                    <ul id="transaction-list"></ul>
                </section>
            </main>
        </div>
    </div>

    <div id="setup-modal" class="modal">
        <div class="modal-content card">
            <h3>Halo! 👋</h3>
            <p>Masukkan saldo awal dompetmu:</p>
            <div class="setup-inputs">
                <input type="number" id="init-cash" placeholder="Saldo Cash (Rp)">
                <input type="number" id="init-bank" placeholder="Saldo Bank (Rp)">
                <input type="number" id="init-qris" placeholder="Saldo QRIS (Rp)">
            </div>
            <button onclick="saveInitialBalance()" class="btn-primary">Mulai Mencatat</button>
        </div>
    </div>

    <div id="delete-modal" class="modal">
        <div class="modal-content card">
            <div style="font-size: 3rem; margin-bottom: 10px;">⚠️</div>
            <h3>Hapus Transaksi?</h3>
            <p>Data yang dihapus tidak bisa dikembalikan.</p>
            <div class="modal-buttons">
                <button onclick="closeDeleteModal()" class="btn-cancel">Batal</button>
                <button id="confirm-delete-btn" class="btn-delete-confirm">Hapus</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
